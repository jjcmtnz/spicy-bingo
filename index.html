<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spicy Bingo — Eternal Gems</title>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Oswald:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #000; font-family: 'Oswald', sans-serif; padding: 0 20px 30px; }
  #board-view { max-width: 1320px; margin: 0 auto; }
  #site-header { display:flex; flex-direction:column; align-items:center; padding:14px 20px 8px; }
  .logo-wrap { display: flex; justify-content: center; align-items: center; margin-bottom: 32px; }
  .logo-frame { display: inline-flex; align-items: center; border: 3px solid #ff4500; border-radius: 6px; padding: 8px 28px 10px; position: relative; }
  .logo-frame::before { content:''; position:absolute; inset:4px; border:1.5px solid #ff4500; border-radius:3px; }
  .logo-spicy { font-family:'Bungee',cursive; font-size:44px; color:transparent; -webkit-text-stroke:2.5px #f5b800; letter-spacing:0.04em; margin-right:12px; }
  .logo-bingo { font-family:'Bungee',cursive; font-size:44px; color:transparent; -webkit-text-stroke:2.5px #ff4500; letter-spacing:0.04em; }
  .subtitle { text-align:center; font-size:12px; letter-spacing:0.2em; color:#444; text-transform:uppercase; margin-bottom:36px; }
  #landing { max-width:900px; margin:0 auto; }
  .standings-title { font-family:'Bungee',cursive; font-size:14px; letter-spacing:0.2em; color:#555; text-align:center; margin-bottom:14px; }
  .team-cards { display:grid; grid-template-columns:repeat(2,1fr); gap:14px; }
  .team-card { background:#0a0a0a; border:1px solid #1a1a1a; border-radius:8px; overflow:hidden; cursor:pointer; transition:transform 0.15s, border-color 0.15s; border-left-width:4px; }
  .team-card:hover { transform:translateY(-2px); border-color:#333; }
  .tc-header { padding:16px 18px 14px; display:flex; align-items:center; justify-content:space-between; }
  .tc-rank { font-family:'Bungee',cursive; font-size:32px; margin-right:12px; }
  .tc-name { font-family:'Bungee',cursive; font-size:17px; flex:1; letter-spacing:0.04em; }
  .tc-total { font-family:'Bungee',cursive; font-size:30px; color:#ff4500; }
  .tc-label { font-size:10px; color:#555; letter-spacing:0.1em; text-transform:uppercase; text-align:right; }
  .tc-body { padding:12px 18px 16px; border-top:1px solid #111; display:flex; gap:24px; }
  .tc-stat-val { font-family:'Bungee',cursive; font-size:18px; }
  .tc-stat-label { font-size:9px; color:#333; letter-spacing:0.08em; text-transform:uppercase; margin-top:2px; }
  .last-updated { text-align:center; font-size:10px; color:#222; letter-spacing:0.06em; margin-top:18px; }
  #board-view { display:none; }
  .back-btn { display:inline-block; margin-bottom:8px; font-size:11px; color:#444; letter-spacing:0.08em; cursor:pointer; text-transform:uppercase; }
  .back-btn:hover { color:#ff4500; }
  .outer { max-width:1320px; margin:0 auto; display:flex; gap:14px; align-items:flex-start; }
  .meter-wrap { width:70px; flex-shrink:0; display:flex; flex-direction:column; align-items:center; padding-top:110px; }
  .meter-title { font-family:'Bungee',cursive; font-size:8px; letter-spacing:0.1em; color:#444; margin-bottom:6px; writing-mode:vertical-rl; transform:rotate(180deg); height:80px; white-space:nowrap; }
  .meter-track { width:34px; background:#0d0d0d; border:1px solid #1a1a1a; border-radius:4px; overflow:hidden; height:480px; display:flex; flex-direction:column-reverse; }
  .meter-fill { width:100%; background:linear-gradient(0deg,#1e7a1e 0%,#8ab800 25%,#c47a00 50%,#d44a00 75%,#cc0000 100%); transition:height 0.8s ease; }
  .meter-score { font-family:'Bungee',cursive; font-size:18px; color:#ff4500; text-align:center; margin-top:8px; }
  .meter-denom { font-size:8px; color:#2a2a2a; text-align:center; margin-top:2px; }
  .meter-sub { margin-top:10px; width:100%; text-align:center; }
  .meter-sub-label { font-size:7px; color:#2a2a2a; letter-spacing:0.06em; text-transform:uppercase; margin-bottom:2px; }
  .meter-sub-val { font-family:'Bungee',cursive; font-size:10px; }
  .board { flex:1; min-width:0; }
  .logo-row { display:flex; align-items:center; justify-content:space-between; padding:10px 0 12px; border-top:1px solid #1a1a1a; border-bottom:1px solid #1a1a1a; margin-bottom:12px; }
  .team-lbl { font-size:22px; letter-spacing:0.1em; text-transform:uppercase; font-weight:700; font-family:'Bungee',cursive; }
  .logo-sm { display:inline-flex; align-items:center; border:3px solid #ff4500; border-radius:6px; padding:8px 28px 10px; position:relative; }
  .logo-sm::before { content:''; position:absolute; inset:4px; border:1.5px solid #ff4500; border-radius:3px; }
  .ls-spicy { font-family:'Bungee',cursive; font-size:44px; color:transparent; -webkit-text-stroke:2.5px #f5b800; letter-spacing:0.04em; margin-right:12px; }
  .ls-bingo { font-family:'Bungee',cursive; font-size:44px; color:transparent; -webkit-text-stroke:2.5px #ff4500; letter-spacing:0.04em; }

  .grid { display:grid; grid-template-columns:repeat(5,1fr); gap:7px; margin-bottom:20px; }
  .tile { background:#111; border:2px solid #333; border-radius:4px; padding:10px 9px 9px; display:flex; flex-direction:column; align-items:center; min-height:158px; position:relative; }
  .tile.complete { background:#1a0500; border-color:#ff4400 !important; box-shadow:0 0 14px #ff440055; }
  .tile.complete .tile-name { color:#ff6622; }
  .tile.complete .badge { background:#2a0800 !important; border-color:#ff4400 !important; color:#ff8844 !important; }
  .tile-num { position:absolute; top:5px; left:7px; font-family:'Bungee',cursive; font-size:8px; color:rgba(255,255,255,0.18); }
  .tile-name { font-size:10.5px; font-weight:700; color:#ddd; text-transform:uppercase; letter-spacing:0.04em; line-height:1.3; text-align:center; min-height:34px; display:flex; align-items:center; justify-content:center; width:100%; }
  .tile.complete .tile-name { color:#f5b800; }
  .tier-badges { display:flex; gap:3px; width:100%; margin-bottom:9px; }
  .badge { flex:1; text-align:center; font-family:'Bungee',cursive; font-size:10px; padding:5px 0; border:1.5px solid #1a1a1a; color:#2a2a2a; background:#0d0d0d; position:relative; }
  .badge .blabel { display:block; }
  .badge .bnum { display:none; }
  .tile:hover .badge .blabel { display:none; }
  .tile:hover .badge .bnum { display:block; }
  .badge.s1{background:#0a2a0a;border-color:#1e7a1e;color:#5eff5e;}
  .badge.s2{background:#2a1a00;border-color:#c47a00;color:#ffcc44;}
  .badge.s3{background:#2a0d00;border-color:#d44a00;color:#ff8844;}
  .badge.s4{background:#2a0000;border-color:#cc0000;color:#ff4444;}

  .heat-track { height:7px; background:linear-gradient(90deg,#0d2a0d,#2a1800,#2a0d00,#1a0000); border-radius:3px; overflow:hidden; }
  .heat-fill { height:100%; border-radius:3px; transition:width 0.6s ease; }
  .tile.complete .heat-track { background:#2a0800; }
  .tile.complete .heat-fill { background:linear-gradient(90deg,#cc2200,#ff6600) !important; }
  .heat-label { font-size:9.5px; color:#444; text-align:center; margin-top:4px; letter-spacing:0.05em; font-weight:600; }
  .bottom-section { display:flex; gap:8px; }
  .panel { border:1px solid #1a1a1a; border-radius:6px; overflow:hidden; }
  .ph { padding:8px 14px; background:#0d0d0d; border-bottom:1px solid #1a1a1a; font-size:11px; font-weight:700; letter-spacing:0.12em; color:#555; text-transform:uppercase; }
  .tiers-panel { flex:0 0 160px; }
  .tier-row { display:flex; align-items:center; gap:10px; padding:6px 14px; border-bottom:1px solid #111; }
  .tier-row:last-child{border-bottom:none;}
  .tsw { width:10px; height:10px; border-radius:2px; flex-shrink:0; }
  .tn { font-family:'Bungee',cursive; font-size:12px; color:#888; min-width:24px; }
  .tv { font-size:12px; color:#555; }
  .bonus-panel { flex:0 0 180px; }
  .bonus-row { display:flex; align-items:center; justify-content:space-between; gap:20px; padding:6px 14px; border-bottom:1px solid #111; }
  .bonus-row:last-child{border-bottom:none;}
  .bn { font-family:'Bungee',cursive; font-size:12px; }
  .bv { font-family:'Bungee',cursive; font-size:12px; }
  .lines-panel { flex:1; }
  .lines-grid { display:grid; grid-template-columns:repeat(4,1fr); }
  .lc { padding:5px 10px; border-right:1px solid #111; border-bottom:1px solid #111; position:relative; min-height:36px; }
  .lc:nth-child(4n){border-right:none;} .lc:nth-last-child(-n+4){border-bottom:none;}
  .ln { font-family:'Bungee',cursive; font-size:11px; color:#555; }
  .lt { font-size:11px; color:#444; font-weight:600; }
  .lc.bt1{background:#0a1a0a;} .lc.bt2{background:#1a1200;} .lc.bt3{background:#1a0800;} .lc.bt4{background:#1a0000;}
  .lc.bt1 .ln{color:#1e7a1e;} .lc.bt2 .ln{color:#c47a00;} .lc.bt3 .ln{color:#d44a00;} .lc.bt4 .ln{color:#cc0000;}
  .lb { position:absolute; top:4px; right:6px; font-family:'Bungee',cursive; font-size:8px; }
  .ltot { position:absolute; bottom:3px; right:6px; font-size:8px; color:#555; }
  .loading { color:#333; font-size:13px; letter-spacing:0.1em; padding:60px; text-align:center; text-transform:uppercase; }
  @media(max-width:600px){ .team-cards{grid-template-columns:1fr;} }

  /* Tile hover + modal */
  .tile { cursor:pointer; transition: filter 0.15s, transform 0.15s; display:flex; flex-direction:column; }
  .tile:hover { filter:brightness(1.6); transform:translateY(-2px); }

  .tile-modal-overlay {
    display:none; position:fixed; inset:0; z-index:900;
    background:rgba(0,0,0,0.7); backdrop-filter:blur(2px);
  }
  .tile-modal-overlay.visible { display:flex; align-items:center; justify-content:center; }
  .tile-modal {
    background:#0d0d0d; border:1px solid #333; border-radius:8px;
    padding:0; max-width:560px; width:92%; max-height:82vh;
    display:flex; flex-direction:column;
    box-shadow: 0 8px 40px rgba(0,0,0,0.9);
  }
  .tm-header {
    padding:18px 22px 16px; border-bottom:1px solid #1a1a1a;
    display:flex; align-items:center; justify-content:space-between;
  }
  .tm-title { font-family:'Bungee',cursive; font-size:19px; color:#ff4500; letter-spacing:0.06em; }
  .tm-thresholds { font-size:13px; color:#555; letter-spacing:0.08em; margin-top:4px; }
  .tm-close { font-family:'Bungee',cursive; font-size:20px; color:#444; cursor:pointer; line-height:1; }
  .tm-close:hover { color:#ff4500; }
  .tm-body { padding:18px 22px; overflow-y:auto; }
  .tm-section { font-size:11px; color:#666; letter-spacing:0.1em; text-transform:uppercase; margin:14px 0 8px; font-weight:700; }
  .tm-section:first-child { margin-top:0; }
  .tm-req-val { font-size:13px; color:#186618; padding:4px 0; }
  .tm-ca-val  { font-size:13px; color:#a86600; padding:4px 0; }
  .tm-ca-notes { font-size:11px; color:#555; padding:2px 0 4px; font-style:italic; }
  .tm-divider { border:none; border-top:1px solid #1a1a1a; margin:12px 0; }
  .tm-items { display:flex; flex-direction:column; gap:2px; }
  .tm-item { font-size:13px; color:#999; padding:5px 0; border-bottom:1px solid #0d0d0d; line-height:1.4; }
  .tm-item:last-child { border-bottom:none; }
</style>
</head>
<body>

<div id="tile-modal-overlay" class="tile-modal-overlay" onclick="closeModal(event)">
  <div class="tile-modal" onclick="event.stopPropagation()">

</div>
<div id="site-header"><div class="logo-frame"><span class="logo-spicy">SPICY</span><span class="logo-bingo">BINGO</span></div><div style="color:#444;font-size:11px;letter-spacing:0.2em;text-transform:uppercase;text-align:center;margin-top:10px;">Eternal Gems</div></div>

        <div style="display:flex;align-items:center;gap:0;">

            <div id="bTile" style="color:#A86600;font-family:'Bungee',cursive;font-size:16px;line-height:1;">0</div>

<script>
const API = "https://script.google.com/macros/s/AKfycbwsDA5ZLOK7FPBT0lkrZXRtYEZHYoJM8vRQqK3yvwJcpJLyDot7oNFEQ3f32-ZsBU_MAA/exec";
const MAX = 2950;
const RC  = ["#cc0000","#d44a00","#c47a00","#8ab800","#1e7a1e"];
const BINGO_LINES = [
  {n:"Row 1",t:"1, 2, 3, 4, 5"},{n:"Row 2",t:"6, 7, 8, 9, 10"},
  {n:"Row 3",t:"11, 12, 13, 14, 15"},{n:"Row 4",t:"16, 17, 18, 19, 20"},
  {n:"Row 5",t:"21, 22, 23, 24, 25"},{n:"Col 1",t:"1, 6, 11, 16, 21"},
  {n:"Col 2",t:"2, 7, 12, 17, 22"},{n:"Col 3",t:"3, 8, 13, 18, 23"},
  {n:"Col 4",t:"4, 9, 14, 19, 24"},{n:"Col 5",t:"5, 10, 15, 20, 25"},
  {n:"Diag ↘",t:"1, 7, 13, 19, 25"},{n:"Diag ↗",t:"5, 9, 13, 17, 21"},
];
const BONUS=[0,15,30,60,120], CUMUL=[0,15,45,105,225];
const TEAMS = [
  {name:"Team Scotch Bonnet",   slug:"scotch",    sheetName:"Team Scotch Bonnet"},
  {name:"Team Ghost Pepper",   slug:"ghost",     sheetName:"Team Ghost Pepper"},
  {name:"Team Naga Viper",     slug:"naga",      sheetName:"Team Naga Viper"},
  {name:"Team Carolina Reaper",slug:"carolina",  sheetName:"Team Carolina Reaper"},
];

let cachedData = null;
let currentTeam = null;

function getHash() { return window.location.hash.replace('#',''); }
function setHash(h) { window.location.hash = h; }

function showLanding() {
  setHash('');
  document.getElementById('landing').style.display='block';
  document.getElementById('board-view').style.display='none';
  document.getElementById('site-header').style.paddingLeft='20px';
  document.title = 'Spicy Bingo — Eternal Gems';
}

function showBoard(slug) {
  const team = TEAMS.find(t => t.slug === slug);
  if (!team) return;
  currentTeam = team;
  setHash(slug);
  document.getElementById('landing').style.display='none';
  document.getElementById('board-view').style.display='block';
  document.getElementById('site-header').style.paddingLeft='104px';
  document.title = 'Spicy Bingo — ' + team.name;
  if (cachedData) {
    const td = cachedData.teams.find(t => t.sheetName === team.sheetName);
    if (td) renderBoard(td);
  }
}

window.addEventListener('hashchange', () => {
  const h = getHash();
  if (!h) showLanding();
  else showBoard(h);
});

// JSONP fetch
function fetchData() {
  return new Promise((resolve, reject) => {
    const cbName = 'sbcb' + Date.now();
    let done = false;
    const timer = setTimeout(() => {
      if (!done) { done = true; delete window[cbName]; reject(new Error('Timeout')); }
    }, 20000);
    window[cbName] = function(data) {
      if (done) return; done = true;
      clearTimeout(timer); delete window[cbName];
      resolve(data);
    };
    const script = document.createElement('script');
    script.src = API + '?callback=' + cbName;
    script.onerror = function() {
      if (done) return; done = true;
      clearTimeout(timer); delete window[cbName];
      reject(new Error('Script load error'));
    };
    document.head.appendChild(script);
  });
}

async function load() {
  try {
    const data = await fetchData();
    cachedData = data;
    if (data.tileData) {
      Object.keys(data.tileData).forEach(k => {
        TILE_DATA[Number(k)] = data.tileData[k];
      });
    }


    // Sort by total
    data.teams.sort((a,b) => (b.total||0) - (a.total||0));
    data.teams.forEach((t,i) => t.rank = i+1);

    renderLanding(data.teams);

    if (currentTeam) {
      const td = data.teams.find(t => t.sheetName === currentTeam.sheetName);
      if (td) renderBoard(td);
    }

    const lu = document.getElementById('lastUpdated');
    if (lu) lu.textContent = 'Last updated: ' + new Date().toLocaleTimeString();
  } catch(e) {
    console.error(e);
    document.getElementById('cards').innerHTML = '<div class="loading">Failed to load: ' + e.message + '</div>';
    setTimeout(load, 15000);
  }
}

function renderLanding(teams) {
  const cards = document.getElementById('cards');
  cards.innerHTML = '';
  teams.forEach(team => {
    const rc = team.rank <= 3 ? 'r'+team.rank : '';
    const el = document.createElement('div');
    el.className = 'team-card';
    el.onclick = () => showBoard(TEAMS.find(t=>t.sheetName===team.sheetName).slug);
    const tColors = {"Team Scotch Bonnet":"#186618","Team Ghost Pepper":"#B83D00","Team Naga Viper":"#A86600","Team Carolina Reaper":"#AA0000"};
    const tColor = tColors[team.sheetName] || '#888';
    el.style.border = '2px solid ' + tColor;
    el.style.borderRadius = '6px';
    el.innerHTML = `
      <div style="padding:18px 20px 14px;">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
          <div>
            <div style="color:${tColor};opacity:0.4;font-size:11px;letter-spacing:0.12em;margin-bottom:3px;">#${team.rank}</div>
            <div style="color:${tColor};font-family:'Bungee',cursive;font-size:16px;letter-spacing:0.04em;">${team.name}</div>
          </div>
          <div style="text-align:right;">
            <div style="color:${tColor};font-family:'Bungee',cursive;font-size:38px;line-height:1;">${team.total}</div>
            <div style="color:${tColor};opacity:0.4;font-size:10px;letter-spacing:0.1em;">TOTAL PTS</div>
          </div>
        </div>
        <div style="border-top:1px solid #111;padding-top:10px;display:flex;">
          <div style="flex:1;text-align:center;border-right:1px solid #111;">
            <div style="color:#A86600;font-family:'Bungee',cursive;font-size:17px;">${team.tilePeps}</div>

    el.addEventListener('mouseover', () => {
      el.style.transform = 'translateY(-3px)';
      el.style.boxShadow = '0 0 18px ' + tColor + '44';
      el.querySelector('.tc-footer').style.color = tColor;
    });
    el.addEventListener('mouseout', () => {
      el.style.transform = 'translateY(0)';
      el.style.boxShadow = 'none';
      el.querySelector('.tc-footer').style.color = '#333';
    });
    cards.appendChild(el);
  });
}

function parseThresholds(str) {
  const parts = String(str).split('·').map(s => parseInt(s.trim())).filter(n => !isNaN(n));
  while (parts.length < 4) parts.push(0);
  return parts;
}

function tierNum(s) {
  if (s==='T4') return 4; if (s==='T3') return 3;
  if (s==='T2') return 2; if (s==='T1') return 1; return 0;
}

function renderBoard(team) {
  document.getElementById('mFill').style.height = Math.min(100,(team.total/MAX)*100)+'%';
  document.getElementById('mScore').textContent = team.total;
  document.getElementById('mTile').textContent  = team.tilePeps;
  document.getElementById('mBingo').textContent = team.bingoPeps;
  const boardColors = {"Team Scotch Bonnet":"#186618","Team Ghost Pepper":"#B83D00","Team Naga Viper":"#A86600","Team Carolina Reaper":"#AA0000"};
  const bNameEl = document.getElementById('bTeamName');
  bNameEl.textContent = team.name;
  const tc = boardColors[team.sheetName] || '#888';
  bNameEl.style.color = tc;
  const bTotalEl = document.getElementById('bTotal');
  const bTotalLbl = document.getElementById('bTotalLbl');
  if (bTotalEl) bTotalEl.style.color = tc;
  if (bTotalLbl) bTotalLbl.style.color = tc;
  // Update logo row border color to match team
  const logoRow = document.querySelector('.logo-row');
  if (logoRow) { logoRow.style.borderBottom = '1px solid ' + (boardColors[team.sheetName] || '#1a1a1a') + '44'; }
  document.getElementById('bTotal').textContent = team.total;
  document.getElementById('bTile').textContent  = team.tilePeps;
  document.getElementById('bBingo').textContent = team.bingoPeps;

  const tiles = team.tiles || [];
  let html = '';
  tiles.forEach((tile, i) => {
    const [t1,t2,t3,t4] = parseThresholds(tile.thresholds);
    const drops = tile.drops || 0;
    const complete = tierNum(tile.tier) >= 4;
    const rc = RC[Math.floor(i/5)] || '#555';
    const tierLabels = ['T1','T2','T3','T4'];
    const badges = [t1,t2,t3,t4].map((th,idx) =>
      `<div class="badge ${drops>=th?'s'+(idx+1):''}"><span class="blabel">${tierLabels[idx]}</span><span class="bnum">${th}</span></div>`).join('');
    const fillPct = t4 > 0 ? Math.min(100, (drops/t4)*100) : 0;
    const fillColor = fillPct >= 100 ? 'linear-gradient(90deg,#cc2200,#ff6600)' :
      fillPct > 66 ? 'linear-gradient(90deg,#1e7a1e,#c47a00 40%,#d44a00)' :
      fillPct > 33 ? 'linear-gradient(90deg,#1e7a1e,#c47a00)' : '#1e7a1e';
    html += `<div class="tile${complete?' complete':''}" style="border-color:${rc}" data-tilenum="${tile.num}" onclick="tileClick(event,this)">
      <div style="height:0"></div>
      <div class="tile-num">${tile.num}</div>
      <div class="tile-name">${tile.name}</div>
      <div style="flex:1;min-height:16px;"></div>
      <div class="tier-badges">${badges}</div>
      <div style="width:100%;margin-top:6px;">
        <div class="heat-track" style="width:100%;"><div class="heat-fill" style="width:${fillPct}%;background:${fillColor};"></div></div>
        <div class="heat-label">${drops} / ${t4} drops</div>
      </div>
    </div>`;
  });

  if (!html) html = '<div style="color:#ff4444;padding:20px">No tile data (tiles: ' + tiles.length + ')</div>';
  document.getElementById('bGrid').innerHTML = html;

  let lhtml = '';
  BINGO_LINES.forEach((bl,i) => {
    const b = (team.bingo||[])[i] || {};
    let tier = 0;
    if (b.t4===true||b.t4==='TRUE'||b.t4===1) tier=4;
    else if (b.t3==='✓') tier=3;
    else if (b.t2==='✓') tier=2;
    else if (b.t1==='✓') tier=1;
    const bc = ['','#1e7a1e','#c47a00','#d44a00','#cc0000'][tier]||'';
    const bonus = tier>0 ? `<div class="lb" style="color:${bc}">+${BONUS[tier]}</div><div class="ltot">= ${CUMUL[tier]}</div>` : '';
    lhtml += `<div class="lc${tier>0?' bt'+tier:''}"><div class="ln">${bl.n}</div><div class="lt">${bl.t}</div>${bonus}</div>`;
  });
  document.getElementById('bLines').innerHTML = lhtml;
}

// Tooltip logic
const tooltip = document.getElementById('tile-tooltip');
let tooltipVisible = false;

function showTooltip(e, tileNum, tileName) {
  const data = TILE_DATA[tileNum];
  if (!data) return;
  let html = `<div class="tt-title">${tileName}</div>`;
  html += `<div class="tt-section">Qualifying Drops</div>`;
  data.items.forEach(item => { html += `<div class="tt-item">• ${item}</div>`; });
  if (data.req) { html += `<div class="tt-section">T4 Drop Req</div><div class="tt-req">✦ ${data.req}</div>`; }
  if (data.ca)  { html += `<div class="tt-section">T4 CA</div><div class="tt-ca">✦ ${data.ca}${data.caNotes ? ' — ' + data.caNotes : ''}</div>`; }
  tooltip.innerHTML = html;
  positionTooltip(e);
  tooltip.classList.add('visible');
  tooltipVisible = true;
}

function positionTooltip(e) {
  const x = e.clientX + 14;
  const y = e.clientY + 14;
  const tw = tooltip.offsetWidth || 280;
  const th = tooltip.offsetHeight || 200;
  tooltip.style.left = (x + tw > window.innerWidth ? x - tw - 28 : x) + 'px';
  tooltip.style.top  = (y + th > window.innerHeight ? y - th - 28 : y) + 'px';
}

function hideTooltip() {
  tooltip.classList.remove('visible');
  tooltipVisible = false;
}

document.addEventListener('mousemove', e => {
  if (tooltipVisible) positionTooltip(e);
});
document.addEventListener('click', e => {
  if (!e.target.closest('.tile')) hideTooltip();
});
